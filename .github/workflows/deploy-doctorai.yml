name: Deploy DoctorAI to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"
  AZURE_WEBAPP_NAME: doctorai-aptiqo

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AZURE_SPEECH_KEY: ${{ secrets.AZURE_SPEECH_KEY }}
      AZURE_SPEECH_ENDPOINT: ${{ secrets.AZURE_SPEECH_ENDPOINT }}
      AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
      AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      AZURE_OPENAI_SUMMARY_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_SUMMARY_DEPLOYMENT }}
      APP_BASE_URL: https://doctorai-aptiqo.azurewebsites.net
      ENABLE_DEMO_LOGIN: "false"
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Prune dev dependencies
        run: pnpm prune --prod

      - name: Prepare deployment artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy-package
          cp -R .next deploy-package/.next
          cp -R public deploy-package/public
          cp -R scripts deploy-package/scripts
          cp -R prisma deploy-package/prisma
          cp -R node_modules deploy-package/node_modules
          cp package.json deploy-package/package.json
          cp pnpm-lock.yaml deploy-package/pnpm-lock.yaml
          cp next.config.mjs deploy-package/next.config.mjs

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: doctorai-aptiqo-package
          path: deploy-package

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: doctorai-aptiqo-package
          path: .

      - name: Deploy to Azure App Service
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_DOCTORAI_APTIQO }}
          package: .
